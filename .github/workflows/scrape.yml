name: Scrape competitor prices

# Runs Playwright on GitHub's (US-based) runners and commits prices.json.
# Start with a manual run on one category to confirm it works before scheduling.

on:
  workflow_dispatch:
    inputs:
      categories:
        description: "Comma-separated categories (blank = all). e.g. PlayStation"
        required: false
        default: "PlayStation"
      limit:
        description: "Max URLs (0 = no limit). Use a small number to test."
        required: false
        default: "60"
  # schedule:
  #   - cron: "0 */6 * * *"   # uncomment once it is working well

permissions:
  contents: write

concurrency:
  group: scrape-prices
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Playwright + Chromium
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          python -m playwright install --with-deps chromium

      - name: Run scraper
        env:
          CATEGORIES: ${{ github.event.inputs.categories }}
          LIMIT: ${{ github.event.inputs.limit }}
        run: |
          python scrape.py ${CATEGORIES:+--categories "$CATEGORIES"} ${LIMIT:+--limit "$LIMIT"}

      - name: Commit prices.json
        run: |
          git config user.name  "price-bot"
          git config user.email "actions@users.noreply.github.com"
          git add prices.json scrape_report.json
          if git diff --cached --quiet; then
            echo "No price changes."
          else
            git commit -m "chore: update prices.json [skip ci]"
            git pull --rebase --autostash origin main
            git push
          fi
